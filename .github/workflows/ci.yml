name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run tests
        run: pytest tests -q

      - name: Build container image
        run: docker build -t learn-new:ci .

      - name: Render Helm chart
        run: helm template learn-new ops/helm/learn-new
