version: 1

llm:
  default_provider: siliconflow
  default_profile: chat
  timeout_seconds: 120
  max_retries: 2

  providers:
    siliconflow:
      enabled: true
      base_url: https://api.siliconflow.cn/v1
      api_key: ${SILICONFLOW_API_KEY}
      models:
        chat: Qwen/Qwen2.5-32B-Instruct
        reasoning: deepseek-ai/DeepSeek-R1
        fast: Qwen/Qwen2.5-7B-Instruct
        embedding: BAAI/bge-m3

      generation:
        temperature: 0.7
        top_p: 0.95
        max_tokens: 4096

  routing:
    profiles:
      chat:
        provider: siliconflow
        model: Qwen/Qwen2.5-32B-Instruct
      reasoning:
        provider: siliconflow
        model: deepseek-ai/DeepSeek-R1
      fast:
        provider: siliconflow
        model: Qwen/Qwen2.5-7B-Instruct
      embedding:
        provider: siliconflow
        model: BAAI/bge-m3

  # Add more providers with the same shape when needed.
  # Example:
  #
  # providers:
  #   openai:
  #     enabled: true
  #     base_url: https://api.openai.com/v1
  #     api_key: ${OPENAI_API_KEY}
  #     models:
  #       chat: gpt-4.1
  #       reasoning: gpt-4.1
  #       fast: gpt-4.1-mini
  #       embedding: text-embedding-3-large

storage:
  backend: file
  sqlite_path: .learn/sessions.db

security:
  enabled: false
  api_key_header: X-Admin-Key
  api_key: ${LEARN_NEW_ADMIN_KEY}
  principals: []
  # Example:
  # principals:
  #   - name: viewer
  #     api_key: ${LEARN_NEW_VIEWER_KEY}
  #     role: viewer
  #   - name: operator
  #     api_key: ${LEARN_NEW_OPERATOR_KEY}
  #     role: operator
  #   - name: admin
  #     api_key: ${LEARN_NEW_ADMIN_KEY}
  #     role: admin

rate_limit:
  enabled: false
  requests: 120
  window_seconds: 60

observability:
  metrics_enabled: true
  request_id_header: X-Request-ID
  audit_log_path: .learn/audit/events.jsonl

sandbox:
  backend: local
  timeout_seconds: 10
  docker_image: python:3.12-slim
  memory_mb: 256
  cpu_limit: 1.0
