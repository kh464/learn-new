services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: learn-new:local
    ports:
      - "8000:8000"
    environment:
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      LEARN_NEW_ADMIN_KEY: ${LEARN_NEW_ADMIN_KEY:-}
    volumes:
      - learn_new_workspace:/app/.learn
      # Enable this mount if you switch sandbox.backend to docker inside the container.
      # - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  learn_new_workspace:
