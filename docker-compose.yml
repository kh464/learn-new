services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: learn-new:local
    ports:
      - "8000:8000"
    environment:
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      LEARN_NEW_ADMIN_KEY: ${LEARN_NEW_ADMIN_KEY:-}
      LEARN_NEW_VIEWER_KEY: ${LEARN_NEW_VIEWER_KEY:-}
      LEARN_NEW_OPERATOR_KEY: ${LEARN_NEW_OPERATOR_KEY:-}
      LEARN_NEW_POSTGRES_DSN: ${LEARN_NEW_POSTGRES_DSN:-}
      LEARN_NEW_REDIS_URL: ${LEARN_NEW_REDIS_URL:-}
      LEARN_NEW_QDRANT_URL: ${LEARN_NEW_QDRANT_URL:-}
    volumes:
      - learn_new_workspace:/app/.learn
      # Enable this mount if you switch sandbox.backend to docker inside the container.
      # - /var/run/docker.sock:/var/run/docker.sock
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  learn_new_workspace:
