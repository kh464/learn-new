replicaCount: 2

image:
  repository: learn-new
  tag: local
  pullPolicy: IfNotPresent

imagePullSecrets: []

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

terminationGracePeriodSeconds: 30

containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  annotations: {}
  className: ""
  host: learn-new.local
  path: /
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

env:
  LEARN_NEW_CONFIG_PATH: /app/config/llm.production.yaml
  LEARN_NEW_SECRET_DIR: /app/secrets

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

rbac:
  create: true

networkPolicy:
  enabled: true
  allowIngressFrom: []
  allowEgressTo: []

secret:
  create: true
  name: ""
  data: {}

secretMount:
  enabled: true
  mountPath: /app/secrets

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health/ready
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  path: /health/ready
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 12

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
