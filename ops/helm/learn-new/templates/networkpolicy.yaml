{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowIngressFrom }}
        {{- toYaml .Values.networkPolicy.allowIngressFrom | nindent 8 }}
        {{- else }}
        []
        {{- end }}
  egress:
    - to:
        {{- if .Values.networkPolicy.allowEgressTo }}
        {{- toYaml .Values.networkPolicy.allowEgressTo | nindent 8 }}
        {{- else }}
        []
        {{- end }}
{{- end }}
